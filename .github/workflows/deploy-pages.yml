name: Deploy GitHub Pages

on:
  workflow_dispatch:
  push:
    branches:
      - pages-src

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build site
        run: |
          mkdir -p _site/projects/{CV,DL,LLM,PhySim}
          cp index.html .nojekyll _site/
          cp -r assets _site/
          cp projects/CV/index.html _site/projects/CV/
          cp projects/DL/index.html _site/projects/DL/
          cp projects/LLM/index.html _site/projects/LLM/
          cp projects/PhySim/index.html _site/projects/PhySim/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
