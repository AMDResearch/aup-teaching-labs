# Nav2 params for LeKiwi (holonomic omni base). Map+localization from RTAB-Map.
# Frames: map (rtabmap) -> odom (rtabmap) -> base_link (base driver) -> camera_optical (static).
amcl:
  ros__parameters:
    use_sim_time: false   # NOT used (RTAB-Map provides map->odom); left for completeness

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    enable_stamped_cmd_vel: false
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.5
      stateful: true
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 40
      model_dt: 0.1
      batch_size: 1000
      vx_std: 0.15
      vy_std: 0.15
      wz_std: 0.3
      vx_max: 0.20
      vx_min: -0.20
      vy_max: 0.20
      wz_max: 1.0
      motion_model: "Omni"          # holonomic
      visualize: false
      TrajectoryVisualizer:
        trajectory_step: 5
      AckermannConstraints:
        min_turning_r: 0.0
      critics: ["ConstraintCritic", "GoalCritic", "GoalAngleCritic", "PreferForwardCritic",
                "ObstaclesCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic"]
      ConstraintCritic: {enabled: true, cost_power: 1, cost_weight: 4.0}
      GoalCritic: {enabled: true, cost_power: 1, cost_weight: 5.0, threshold_to_consider: 1.0}
      GoalAngleCritic: {enabled: true, cost_power: 1, cost_weight: 3.0, threshold_to_consider: 0.5}
      PreferForwardCritic: {enabled: false}
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 0.4
        critical_weight: 4.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.03
        near_goal_distance: 0.5
      PathAlignCritic: {enabled: true, cost_power: 1, cost_weight: 14.0, threshold_to_consider: 0.5}
      PathFollowCritic: {enabled: true, cost_power: 1, cost_weight: 5.0, threshold_to_consider: 0.6}
      PathAngleCritic: {enabled: false, cost_power: 1, cost_weight: 2.0, threshold_to_consider: 0.5}

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.16
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: pc
        pc:
          topic: /rtabmap/cloud_obstacles
          data_type: "PointCloud2"
          marking: true
          clearing: true
          max_obstacle_height: 0.6
          min_obstacle_height: 0.05
          obstacle_max_range: 3.0
          raytrace_max_range: 3.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.08
        cost_scaling_factor: 1.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.16
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.08
        cost_scaling_factor: 1.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.2
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    enable_stamped_cmd_vel: false
    behavior_plugins: ["spin", "backup", "wait"]
    spin: {plugin: "nav2_behaviors::Spin"}
    backup: {plugin: "nav2_behaviors::BackUp"}
    wait: {plugin: "nav2_behaviors::Wait"}

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom

lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    node_names: ["controller_server", "planner_server", "behavior_server", "bt_navigator"]
