# slam_toolbox (online async, MAPPING) params for the demo0-v2 depth->laserscan prototype.
# 2D SLAM straight off the /scan that depthimage_to_laserscan makes from the ZED depth image.
# Short-range + slow, matching our ~1 FPS VGA depth (max useful range ~3 m).
# Frames: map (slam_toolbox) -> odom (lekiwi_base) -> base_link -> camera_optical (static).
slam_toolbox:
  ros__parameters:
    solver_plugin: solver_plugins::CeresSolver
    ceres_linear_solver: SPARSE_NORMAL_CHOLESKY
    ceres_preconditioner: SCHUR_JACOBI
    ceres_trust_strategy: LEVENBERG_MARQUARDT
    ceres_dogleg_type: TRADITIONAL_DOGLEG
    ceres_loss_function: None

    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    mode: mapping

    debug_logging: false
    throttle_scans: 1
    transform_publish_period: 0.02
    transform_timeout: 1.0            # map->odom future-validity. 3.0 over-corrected (broke planner
                                      # start pose -> instant status 6); 1.0 was the "robot moves"
                                      # sweet spot (occasional extrapolation, which explore_lite's
                                      # continuous retry tolerates far better than auto_explore.py did).
    map_update_interval: 0.5          # republish /map more often -> feels more responsive
    resolution: 0.05
    max_laser_range: 3.0              # matches ZED depth --max-depth 3.0 (far VGA depth is noise)
    minimum_time_between_scans: 0.0
    minimum_travel_distance: 0.0      # CRITICAL: process EVERY scan even when stationary, so
    minimum_travel_heading: 0.0       # map->odom keeps refreshing to ~now. With >0, a stationary
                                      # robot -> slam stops processing -> map->odom goes stale ->
                                      # controller can't transform the goal -> goal fails -> robot
                                      # stays stationary = DEADLOCK (every goal aborted).
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 3.5
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45

    correlation_search_space_dimension: 0.5
    correlation_search_space_resolution: 0.01
    correlation_search_space_smear_deviation: 0.1
    loop_search_space_dimension: 8.0
    loop_search_space_resolution: 0.05
    loop_search_space_smear_deviation: 0.03
    distance_variance_penalty: 0.5
    angle_variance_penalty: 1.0
    fine_search_angle_offset: 0.00349
    coarse_search_angle_offset: 0.349
    coarse_angle_resolution: 0.0349
    minimum_angle_penalty: 0.9
    minimum_distance_penalty: 0.5
    use_response_expansion: true
