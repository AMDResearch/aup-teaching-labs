# Nav2 params for demo0-v2 AUTONOMOUS EXPLORATION.
# Copied from utils/nav2_lekiwi.yaml (demo1/2 untouched) with exploration-specific changes:
#   * SLOW speeds  -> sharp RAFT depth, good loop closure ("走很慢但要漂亮")
#   * loose final yaw -> holonomic base strafes to goals instead of spinning in place
#   * LOW obstacle band + bigger inflation -> the ~5cm colour blocks are seen as obstacles
#     so the robot AVOIDS them during mapping instead of driving over them
#     (demo1/2 rely on offline mark_blocks.py instead; that doesn't apply to live mapping)
# Frames: map (rtabmap) -> odom (rtabmap) -> base_link (base driver) -> camera_optical (static).
amcl:
  ros__parameters:
    use_sim_time: false

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    enable_stamped_cmd_vel: false
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.12
      yaw_goal_tolerance: 0.6         # EXPLORE: end roughly facing the frontier (camera looks ahead)
      stateful: true
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 40
      model_dt: 0.1
      batch_size: 1000
      vx_std: 0.08                    # EXPLORE: sample translation, little rotation
      vy_std: 0.08
      wz_std: 0.08
      vx_max: 0.06                    # EXPLORE (RTAB): SLOW so RAFT depth (~1.5 FPS) keeps up with
      vx_min: -0.06                   # motion -> fresh map/localisation, fewer stale-depth phantom
      vy_max: 0.06                    # obstacles. Was 0.10.
      wz_max: 0.15                    # slow turns -> finer angular sampling, less ghosting
      motion_model: "Omni"
      visualize: false
      TrajectoryVisualizer:
        trajectory_step: 5
      AckermannConstraints:
        min_turning_r: 0.0
      critics: ["ConstraintCritic", "GoalCritic", "GoalAngleCritic", "PreferForwardCritic",
                "ObstaclesCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic"]
      ConstraintCritic: {enabled: true, cost_power: 1, cost_weight: 4.0}
      GoalCritic: {enabled: true, cost_power: 1, cost_weight: 5.0, threshold_to_consider: 1.0}
      GoalAngleCritic: {enabled: true, cost_power: 1, cost_weight: 3.0, threshold_to_consider: 0.5}
      PreferForwardCritic: {enabled: false}
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 1.5          # EXPLORE: push HARD away from obstacles -> hug the safe centre
        critical_weight: 6.0
        consider_footprint: false
        collision_cost: 10000.0
        collision_margin_distance: 0.03
        near_goal_distance: 0.5
      PathAlignCritic: {enabled: true, cost_power: 1, cost_weight: 14.0, threshold_to_consider: 0.5}
      PathFollowCritic: {enabled: true, cost_power: 1, cost_weight: 5.0, threshold_to_consider: 0.6}
      PathAngleCritic: {enabled: false, cost_power: 1, cost_weight: 2.0, threshold_to_consider: 0.5}

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.16
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: pc
        pc:
          topic: /rtabmap/cloud_obstacles
          data_type: "PointCloud2"
          marking: true
          clearing: true
          max_obstacle_height: 0.6
          min_obstacle_height: 0.12   # EXPLORE: raised 0.05->0.12 so residual low depth-noise stops
                                       # marking a phantom-obstacle ring that boxes the robot in. The
                                       # ~5cm blocks are NOT seen live now -> keep them out of driving
                                       # lanes during exploration; they're marked OFFLINE (mark_blocks).
          obstacle_max_range: 2.0      # EXPLORE: only mark NEAR (more reliable) obstacles (was 2.5)
          raytrace_max_range: 3.0
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.2        # MUST be >= robot_radius 0.16 or the robot clips obstacles
        cost_scaling_factor: 4.0      # (0.08 was too small -> hit the box/corner). Sharp decay (4.0)
                                      # keeps the keep-out halo THIN so lanes stay open despite 0.18.

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.16
      resolution: 0.05
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        subscribe_to_updates: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.18        # >= robot_radius 0.16 (safety); sharp decay opens lanes without
        cost_scaling_factor: 3.5      # boxing the robot in (old 0.22 + gentle 1.5 decay = wide halo).

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.2
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    use_sim_time: false
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    enable_stamped_cmd_vel: false
    behavior_plugins: ["spin", "backup", "wait"]
    spin: {plugin: "nav2_behaviors::Spin"}
    backup: {plugin: "nav2_behaviors::BackUp"}
    wait: {plugin: "nav2_behaviors::Wait"}
    max_rotational_vel: 0.15          # EXPLORE: very slow scan-spin -> dense frames, clean registration
    min_rotational_vel: 0.08
    rotational_acc_lim: 0.5

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom

lifecycle_manager_navigation:
  ros__parameters:
    autostart: true
    node_names: ["controller_server", "planner_server", "behavior_server", "bt_navigator"]
